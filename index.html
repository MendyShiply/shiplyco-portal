<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShiplyCo Fulfillment — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles/main.css"/>
</head>

<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="lg-bg"></div>
  <div class="lg-hex">
    <svg viewBox="0 0 100 100"><polygon points="50,2 93,26 93,74 50,98 7,74 7,26" fill="none" stroke="white" stroke-width="1"/></svg>
  </div>
  <div class="lg-box">
    <div class="lg-brand">
      <svg class="lg-hexicon" viewBox="0 0 60 60">
        <polygon points="30,3 55,17 55,43 30,57 5,43 5,17" fill="#e8241a"/>
        <rect x="22" y="20" width="16" height="3" rx="1.5" fill="white"/>
        <rect x="22" y="28.5" width="16" height="3" rx="1.5" fill="white"/>
        <rect x="22" y="37" width="16" height="3" rx="1.5" fill="white"/>
      </svg>
      <div class="lg-wordmark">
        <div class="lg-name">SHIPLY<span>CO</span></div>
        <div class="lg-sub">fulfillment</div>
      </div>
    </div>
    <div class="lg-title">Client Portal</div>
    <input class="lg-input" id="lgEmail" type="email" placeholder="Email address" autocomplete="email"/>
    <input class="lg-input" id="lgPass" type="password" placeholder="Password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="lg-btn" id="lgBtn" onclick="doLogin()">Sign In</button>
    <div class="lg-err" id="lgErr"></div>
    <a class="lg-forgot" href="#" onclick="doForgotPassword(event)">Forgot password?</a>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" style="display:none">

  <!-- SIDEBAR NAV -->
  <nav id="sidebar">
    <div class="sb-brand">
      <svg class="sb-hex" viewBox="0 0 60 60">
        <polygon points="30,3 55,17 55,43 30,57 5,43 5,17" fill="#e8241a"/>
        <rect x="22" y="20" width="16" height="3" rx="1.5" fill="white"/>
        <rect x="22" y="28.5" width="16" height="3" rx="1.5" fill="white"/>
        <rect x="22" y="37" width="16" height="3" rx="1.5" fill="white"/>
      </svg>
      <div class="sb-wordmark">
        <div class="sb-name">SHIPLY<span>CO</span></div>
        <div class="sb-sub">fulfillment portal</div>
      </div>
    </div>
    <div class="sb-user" id="sbUser"></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <button class="sb-logout" onclick="doLogout()">Sign Out</button>
  </nav>

  <!-- HAMBURGER (mobile) -->
  <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileNav()"></div>

  <!-- MAIN CONTENT -->
  <main id="main">
    <div id="page"></div>
  </main>

  <!-- NOTIFICATION BELL -->
  <div id="notifBell" style="position:fixed;top:14px;right:18px;z-index:200;display:none">
    <button onclick="toggleNotif()" style="background:none;border:none;cursor:pointer;position:relative;padding:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ink2)" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span id="notifDot" style="display:none;position:absolute;top:4px;right:4px;width:8px;height:8px;background:#e8241a;border-radius:50%"></span>
    </button>
    <div id="notifPanel" style="display:none;position:absolute;right:0;top:40px;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:300">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px">Notifications</div>
      <div id="notifList" style="max-height:360px;overflow-y:auto"></div>
    </div>
  </div>

</div><!-- /#app -->

<!-- MODALS (shared overlays used across multiple pages) -->
<div id="confirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;display:none;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--r);padding:28px 32px;max-width:400px;width:90%;box-shadow:var(--shadow-lg)">
    <div id="confirmMsg" style="font-size:15px;margin-bottom:20px;line-height:1.5"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="confirmCancel" class="btn">Cancel</button>
      <button id="confirmOk" class="btn btn-red">Confirm</button>
    </div>
  </div>
</div>

<div id="notifyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--r);padding:24px;max-width:480px;width:90%;box-shadow:var(--shadow-lg)">
    <div style="font-weight:700;font-size:15px;margin-bottom:14px">Notify Customer</div>
    <div id="notifyBody"></div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('notifyModal').style.display='none'">Cancel</button>
      <button class="btn btn-red" id="notifySendBtn">Send</button>
    </div>
  </div>
</div>

<div id="asnDetailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:5000;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--r);max-width:600px;width:90%;max-height:85vh;overflow:auto;box-shadow:var(--shadow-lg)">
    <div class="modal-head">
      <span style="font-weight:700">ASN Detail</span>
      <button onclick="document.getElementById('asnDetailModal').style.display='none'">&#215;</button>
    </div>
    <div class="modal-body" id="asnDetailBody"></div>
    <div class="modal-foot" id="asnDetailFoot"></div>
  </div>
</div>

<!-- ── LOAD ALL MODULES ── -->
<!-- Core -->
<script src="modules/inventory-grid.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>

<!-- Feature Modules -->
<script src="modules/users.js"></script>
<script src="modules/invoices.js"></script>
<script src="modules/ai-assistant.js"></script>
<script src="modules/tara.js"></script>
<script src="modules/receiving.js"></script>
<script src="modules/orders.js"></script>
<script src="modules/dispatch.js"></script>
<script src="modules/inventory.js"></script>
<script src="modules/label-printer.js"></script>
<script src="modules/leaderboard.js"></script>
<script src="modules/supplies.js"></script>
<script src="modules/sku-catalog.js"></script>
<script src="modules/shipping.js"></script>
<script src="modules/edi.js"></script>
<script src="modules/marketplace.js"></script>
<script src="modules/bol.js"></script>
<script src="modules/cycle-counts.js"></script>
<script src="modules/reports.js"></script>
<script src="modules/customers.js"></script>
<script src="modules/locations.js"></script>

</body>
</html>
