<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShiplyCo Fulfillment — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── BRAND ── */
  --red:#e8241a;--red2:#c01e15;--red-light:#fff0ef;
  /* ── NEUTRALS — true black/white, no warm bias ── */
  --ink:#0d0d0d;--ink2:#404040;--ink3:#888;--ink4:#bbb;
  --bg:#f4f4f4;--surface:#ffffff;--surface2:#f9f9f9;
  --border:#e8e8e8;--border2:#d4d4d4;
  /* ── SEMANTIC ── */
  --gold:#a07828;--gold-light:#faf3e0;
  --green:#166e3e;--green-bg:#e8f5ee;
  --blue:#1547b0;--blue-bg:#e8eef9;
  --orange:#b86010;--orange-bg:#fef3e8;
  /* ── SHADOWS — crisper, less diffuse ── */
  --shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 28px rgba(0,0,0,0.14);
  --r:8px;--r-sm:6px;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);position:relative;overflow:hidden}
.lg-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,#1e1e1e,transparent 70%)}
.lg-hex{position:absolute;right:-60px;top:50%;transform:translateY(-50%);width:500px;height:500px;opacity:0.04}
.lg-hex svg{width:100%;height:100%}
.lg-box{position:relative;z-index:2;width:420px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:48px 44px;animation:fadeUp 0.5s ease both}
.lg-brand{display:flex;align-items:center;gap:14px;margin-bottom:36px;justify-content:center}
.lg-hexicon{width:52px;height:52px}
.lg-wordmark{display:flex;flex-direction:column}
.lg-name{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:1px;color:#fff;line-height:1}
.lg-name span{color:var(--red)}
.lg-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:500;margin-top:2px}
.lg-field{margin-bottom:14px}
.lg-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:rgba(255,255,255,0.35);margin-bottom:6px}
.lg-field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px 14px;font-family:'Barlow',sans-serif;font-size:14px;color:#fff;outline:none;transition:border 0.2s}
.lg-field input:focus{border-color:var(--red)}
.lg-field input::placeholder{color:rgba(255,255,255,0.2)}
.lg-btn{width:100%;margin-top:20px;padding:13px;background:var(--red);border:none;border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:0.3px;transition:all 0.2s}
.lg-btn:hover{background:var(--red2);transform:translateY(-1px)}
.lg-divider{text-align:center;font-size:11px;color:rgba(255,255,255,0.2);margin:16px 0}
.demo-row{display:flex;gap:8px}
.demo-btn{flex:1;padding:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:7px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
.demo-btn:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.2)}

/* ── APP ── */
#app{display:none;min-height:100vh;flex-direction:column}
header{background:var(--ink);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.h-brand{display:flex;align-items:center;gap:10px}
.h-hexicon{width:32px;height:32px}
.h-wordmark{display:flex;flex-direction:column}
.h-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;color:#fff;line-height:1}
.h-name span{color:var(--red)}
.h-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);font-weight:500}
.h-right{display:flex;align-items:center;gap:14px}
.h-cust{background:rgba(232,36,26,0.15);border:1px solid rgba(232,36,26,0.3);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;color:#ff7a74}
.h-role{font-size:11px;color:rgba(255,255,255,0.35)}
.h-out{font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;background:none;font-family:'Barlow',sans-serif;transition:all 0.15s}
.h-out:hover{background:rgba(255,255,255,0.08);color:#fff}

/* ── LAYOUT ── */
.shell{display:flex;flex:1}
nav{width:216px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;overflow-x:hidden}
.nav-sec{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);font-weight:700;padding:14px 16px 5px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sec:first-child{margin-top:0}
.nv{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all 0.1s;border-left:3px solid transparent;overflow:hidden;min-width:0}
.nv:hover{background:var(--bg);color:var(--ink)}
.nv.on{background:var(--red-light);color:var(--red);border-left-color:var(--red);font-weight:700}
.nv svg{width:14px;height:14px;opacity:0.5;flex-shrink:0}
.nv.on svg{opacity:1}
.nv span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

main{flex:1;padding:24px 28px 60px;overflow-x:hidden;min-width:0}
.page{animation:fadeUp 0.25s ease both}

/* ── COMMON ── */
.pg-head{margin-bottom:24px}
.pg-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;line-height:1}
.pg-sub{color:var(--ink3);font-size:13px;margin-top:3px;font-weight:400}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);animation:fadeUp 0.4s ease both;transition:transform 0.15s,box-shadow 0.15s;overflow:hidden}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat:nth-child(1){animation-delay:.04s}.stat:nth-child(2){animation-delay:.08s}.stat:nth-child(3){animation-delay:.12s}.stat:nth-child(4){animation-delay:.16s}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink3);font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;line-height:1;margin-bottom:6px;letter-spacing:-0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:0.2px;white-space:nowrap;overflow:hidden;max-width:100%;text-overflow:ellipsis;vertical-align:middle}
.tg{background:var(--green-bg);color:var(--green)}
.tr{background:var(--red-light);color:var(--red)}
.tb{background:var(--blue-bg);color:var(--blue)}
.to{background:var(--orange-bg);color:var(--orange)}
.tgd{background:var(--gold-light);color:var(--gold)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-head{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;min-width:0}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{font-size:12px;color:var(--ink2);border:1px solid var(--border2);border-radius:5px;padding:5px 12px;background:none;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;transition:all 0.1s;white-space:nowrap}
.btn:hover:not(.on){background:var(--bg)}
.btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-red:hover{background:var(--red2)}

.tbar{padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:140px}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--ink3);fill:none;stroke-width:2}
.si{width:100%;padding:7px 10px 7px 28px;border:1px solid var(--border);border-radius:6px;font-family:'Barlow',sans-serif;font-size:13px;background:var(--surface);color:var(--ink);outline:none;transition:border 0.1s}
.si:focus{border-color:var(--red)}

table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink3);font-weight:700;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:10px 14px;vertical-align:middle;font-size:13px;max-width:280px;overflow:hidden;text-overflow:ellipsis}
td.wrap{white-space:normal;max-width:none}
.tfoot{padding:10px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:12px;color:var(--ink3);display:flex;align-items:center;justify-content:space-between}
.mono{font-family:monospace;font-size:11px;color:var(--ink3);font-weight:600}

/* ── TRUCK ── */
.tg-wrap{padding:0}
.tg{margin-bottom:20px}
.tg-head{background:var(--ink);color:#fff;border-radius:var(--r) var(--r) 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tg-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tg-meta{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.tg-body{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.plt{border-bottom:1px solid var(--border)}
.plt:last-child{border-bottom:none}
.plt-head{padding:9px 16px;background:var(--surface2);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s;flex-wrap:wrap}
.plt-head:hover{background:var(--border)}
.plt-num{font-size:10px;font-weight:800;color:var(--ink);background:var(--border2);border-radius:4px;padding:2px 8px;letter-spacing:0.3px;white-space:nowrap}
.plt-loc{font-size:12px;font-weight:700;color:var(--red);white-space:nowrap}
.plt-cnt{font-size:11px;color:var(--ink3);margin-left:auto;white-space:nowrap}
.plt-chev{width:14px;height:14px;fill:none;stroke:var(--ink3);stroke-width:2.5;transition:transform 0.2s;flex-shrink:0}
.plt-chev.open{transform:rotate(180deg)}
.plt-body{display:none;overflow-x:auto}
.plt-body.open{display:block}
.orig-tx{background:#fff3e8;color:#b05a0a;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700;white-space:nowrap}
.orig-ar{background:var(--blue-bg);color:var(--blue);border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700;white-space:nowrap}

/* ── UPC ── */
.qb-wrap{display:flex;align-items:center;gap:8px}
.qb-n{font-weight:700;min-width:44px}
.qb{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px}
.qb-fill{height:100%;border-radius:3px;background:var(--red)}

/* ── CONTAINERS ── */
.cnt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;transition:transform 0.15s}
.cnt-card:hover{transform:translateY(-1px)}
.cnt-top{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.cnt-id{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.3px}
.cnt-date{font-size:11px;color:var(--ink3);margin-top:1px}
.cnt-body{padding:14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cs-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink3);font-weight:700;margin-bottom:2px}
.cs-val{font-size:17px;font-weight:700}
.cnt-items{padding:10px 20px;font-size:12px;color:var(--ink2);border-top:1px solid var(--border)}

/* ── DOCS ── */
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;padding:18px}
.doc-card{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:all 0.15s;background:var(--surface)}
.doc-card:hover{border-color:var(--red);box-shadow:var(--shadow)}
.doc-thumb{height:100px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:30px;border-bottom:1px solid var(--border)}
.doc-info{padding:9px 11px}
.doc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:10px;color:var(--ink3);margin-top:2px}
.doc-badge{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;padding:2px 7px;border-radius:3px;margin-top:4px}
.db-bol{background:var(--blue-bg);color:var(--blue)}
.db-receipt{background:var(--green-bg);color:var(--green)}
.db-photo{background:var(--orange-bg);color:var(--orange)}

/* ── BILLING ── */
.billing-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.rate-table{}
.rate-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
.rate-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border)}
.rate-row:last-child{border-bottom:none}
.rate-name{font-size:13px;font-weight:500}
.rate-desc{font-size:11px;color:var(--ink3);margin-top:1px}
.rate-price{font-size:14px;font-weight:800;color:var(--red);white-space:nowrap}

/* ── INVOICE ── */
.inv-list .inv-row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;flex-wrap:wrap;gap:8px}
.inv-list .inv-row:hover{background:var(--bg)}
.inv-list .inv-row:last-child{border-bottom:none}
.inv-num{font-weight:700;font-size:13px}
.inv-period{font-size:12px;color:var(--ink3)}
.inv-amount{font-size:15px;font-weight:800;color:var(--ink)}
.inv-status{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;padding:3px 9px;border-radius:4px}
.is-paid{background:var(--green-bg);color:var(--green)}
.is-due{background:var(--red-light);color:var(--red)}
.is-draft{background:var(--surface2);color:var(--ink3)}

/* INVOICE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--r);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.inv-doc{padding:40px 48px;font-family:'Barlow',sans-serif}
.inv-doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;padding-bottom:24px;border-bottom:3px solid var(--ink)}
.inv-logo-area{display:flex;align-items:center;gap:12px}
.inv-logo-hex{width:44px;height:44px}
.inv-logo-text{}
.inv-logo-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1px;color:var(--ink);line-height:1}
.inv-logo-name span{color:var(--red)}
.inv-logo-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--ink3);font-weight:600}
.inv-meta-right{text-align:right}
.inv-label{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:6px}
.inv-num-big{font-size:13px;font-weight:700;color:var(--ink3)}
.inv-addresses{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.inv-addr-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:5px}
.inv-addr-name{font-size:14px;font-weight:700;margin-bottom:3px}
.inv-addr-detail{font-size:12px;color:var(--ink2);line-height:1.6}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;background:var(--ink);color:#fff}
.inv-table thead th:last-child{text-align:right}
.inv-table tbody td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
.inv-table tbody td:last-child{text-align:right;font-weight:700}
.inv-table tbody tr:last-child td{border-bottom:none}
.inv-totals{margin-left:auto;width:260px}
.inv-total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.inv-total-row.big{border-top:2px solid var(--ink);padding-top:10px;margin-top:4px;font-size:16px;font-weight:800}
.inv-footer{margin-top:32px;padding-top:18px;border-top:1px solid var(--border);font-size:11px;color:var(--ink3);text-align:center;line-height:1.8}
.modal-actions{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--bg)}

/* ── EMPLOYEE FORM ── */
.fsec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.fsec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fg2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.fg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{display:flex;flex-direction:column;gap:4px;min-width:0}
.field.full{grid-column:1/-1}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border2);border-radius:5px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--ink);background:var(--surface);outline:none;transition:border 0.1s;min-width:0;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(232,36,26,0.08)}
.field textarea{resize:vertical;min-height:60px}
.prow{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:10px}
.irow{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:12px;margin-bottom:8px;position:relative}
.irow-n{position:absolute;top:7px;right:10px;font-size:10px;font-weight:800;color:var(--ink3);background:var(--border);border-radius:3px;padding:1px 6px;text-transform:uppercase;letter-spacing:0.5px}
.add-btn{width:100%;padding:9px;border:2px dashed var(--border2);border-radius:6px;background:none;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:5px;text-transform:uppercase;letter-spacing:0.3px}

async function doLogin(){
  const email = document.getElementById('lgEmail')?.value?.trim();
  const pass  = document.getElementById('lgPass')?.value;
  const btn   = document.getElementById('lgBtn');
  const err   = document.getElementById('lgErr');

  if(!email||!pass){showLgErr('Please enter your email and password.');return;}

  btn.textContent='Signing in…';btn.disabled=true;
  err.style.display='none';

  const {data, error} = await sb.auth.signInWithPassword({email, password:pass});

  if(error){
    btn.textContent='SIGN IN';btn.disabled=false;
    showLgErr(error.message==='Invalid login credentials'
      ?'Incorrect email or password. Please try again.'
      :error.message);
    return;
  }

  // Fetch profile to get role
  const {data:profile} = await sb.from('profiles').select('*').eq('id',data.user.id).single();

  if(!profile){
    btn.textContent='SIGN IN';btn.disabled=false;
    showLgErr('Account not set up yet. Contact your administrator.');
    await sb.auth.signOut();
    return;
  }

  btn.textContent='SIGN IN';btn.disabled=false;
  launchApp(profile);
}

function showLgErr(msg){
  const el=document.getElementById('lgErr');
  if(el){el.textContent=msg;el.style.display='block';}
}

async function doForgotPassword(){
  const email=document.getElementById('lgEmail')?.value?.trim();
  if(!email){showLgErr('Enter your email address above first.');return;}
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error){showLgErr(error.message);return;}
  showLgErr('✓ Password reset email sent — check your inbox.');
  document.getElementById('lgErr').style.background='rgba(30,122,79,0.15)';
  document.getElementById('lgErr').style.borderColor='rgba(30,122,79,0.3)';
  document.getElementById('lgErr').style.color='#4caf87';
}

function launchApp(profile){
  role = profile.role;
  currentEmployee = role==='admin'

async function sendInvite(){
  const name  = document.getElementById('inv_name')?.value?.trim();
  const email = document.getElementById('inv_email')?.value?.trim();
  const role  = document.getElementById('inv_role')?.value;
  const custId= document.getElementById('inv_cust')?.value||null;
  const btn   = document.getElementById('inviteBtn');
  const errEl = document.getElementById('inviteErr');
  const okEl  = document.getElementById('inviteSuccess');

  errEl.style.display='none'; okEl.style.display='none';
  if(!email){errEl.textContent='Email is required.';errEl.style.display='block';return;}

  btn.textContent='Sending…'; btn.disabled=true;

  // Create user in Supabase Auth
  const {data, error} = await sb.auth.admin?.inviteUserByEmail
    ? await sb.auth.admin.inviteUserByEmail(email)
    : {data:null, error:{message:'Admin API not available from client — use Supabase dashboard to invite'}};

  // Fallback: create profile record and let them use password reset to set password
  if(error){
    // Try creating via signUp with a temp password and immediately send reset
    const tempPass = Math.random().toString(36).slice(2,10)+'A1!';
    const {data:signUpData, error:signUpErr} = await sb.auth.signUp({email, password:tempPass, options:{data:{full_name:name}}});

    if(signUpErr){
      btn.textContent='Send Invite →'; btn.disabled=false;
      errEl.textContent=signUpErr.message; errEl.style.display='block';
      return;
    }

    // Insert profile
    if(signUpData?.user){
      await sb.from('profiles').insert({
        id: signUpData.user.id,
        email, full_name:name, role,
        customer_id: role==='customer'?custId:null,
        active:true, invited_at: new Date().toISOString()
      });

      // Send password reset so they can set their own password
      await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://mendyshiply.github.io/shiplyco-portal'
      });
    }

    btn.textContent='Send Invite →'; btn.disabled=false;
    okEl.textContent=`✓ Invite sent to ${email} — they'll receive an email to set their password.`;
    okEl.style.display='block';
    setTimeout(()=>{ document.getElementById('inviteUserModal').style.display='none'; pgAdminLoad(); }, 2500);
    return;
  }

  btn.textContent='Send Invite →'; btn.disabled=false;
  okEl.textContent=`✓ Invite sent to ${email}`;
  okEl.style.display='block';
  setTimeout(()=>{ document.getElementById('inviteUserModal').style.display='none'; pgAdminLoad(); }, 2500);
}

// ══════════════════════════════════════════════════════════════
// ── TARA — Tracks All, Reports Anomalies ──
// ── TWO-STAGE RECEIVING SYSTEM ──
// ══════════════════════════════════════════════════════════════

// ── TARA STATE ──
let TARA_OPEN = false;
let TARA_BRIEFING_DONE = false;
let TARA_MUTED = false;
let TARA_CHAT_MODE = false; // false = voice only, true = open chat panel
let TARA_ALERTS = [];
let TARA_VOICE_ACTIVE = false;
let _taraRecognition = null;

// ── TARA BLOB STATE ──
let _taraBlob = {t:0, speakAmp:0, speakTarget:0, raf:null, analyser:null, freqData:null, audioCtx:null};

// ── TARA PARTICLE SYSTEM ──
let _taraParticles = [];
function _taraInitParticles(){
  _taraParticles = [];
  const N = 280;
  for(let i=0;i<N;i++){
    // Distribute on sphere surface using fibonacci sphere
    const phi = Math.acos(1 - 2*(i+0.5)/N);
    const theta = Math.PI*(1+Math.sqrt(5))*i;
    _taraParticles.push({
      bx: Math.sin(phi)*Math.cos(theta), // base x on unit sphere
      by: Math.sin(phi)*Math.sin(theta), // base y
      bz: Math.cos(phi),                  // base z (depth)
      phase: Math.random()*Math.PI*2,
      speed: 0.3+Math.random()*0.4,
      size: 1.2+Math.random()*1.8,
    });
  }
}

function _taraDrawBlob(){
  const cv=document.getElementById('taraBlobCanvas');
  if(!cv){_taraBlob.raf=null;return;}
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,CX=W/2,CY=H/2;
  _taraBlob.t+=0.008;
  if(_taraBlob.analyser&&_taraBlob.freqData){
    _taraBlob.analyser.getByteFrequencyData(_taraBlob.freqData);
    const avg=Array.from(_taraBlob.freqData.slice(0,60)).reduce((a,b)=>a+b,0)/60;
    _taraBlob.speakTarget=avg/255*0.85;
  } else {
    _taraBlob.speakTarget*=0.92;
  }
  _taraBlob.speakAmp+=(_taraBlob.speakTarget-_taraBlob.speakAmp)*0.10;
  const amp=_taraBlob.speakAmp;
  ctx.clearRect(0,0,W,H);

  const baseR = 38 + amp*10;
  const t = _taraBlob.t;

  // Draw particles
  if(_taraParticles.length===0) _taraInitParticles();
  for(let i=0;i<_taraParticles.length;i++){
    const p=_taraParticles[i];
    // Breathing — radius oscillates
    const breathe = 1 + 0.06*Math.sin(t*p.speed+p.phase) + amp*0.15*Math.sin(t*4+p.phase*2);
    const r = baseR * breathe;
    // Slow rotation around Y axis
    const rotY = t * 0.18;
    const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    const rx = p.bx*cosY + p.bz*sinY;
    const rz = -p.bx*sinY + p.bz*cosY;
    const px = CX + rx*r;
    const py = CY + p.by*r;
    // Depth-based opacity and size (particles facing us are brighter)
    const depth = (rz+1)/2; // 0..1
    const alpha = 0.25 + depth*0.65;
    const sz = p.size*(0.5+depth*0.8);
    ctx.beginPath();
    ctx.arc(px,py,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,38,26,${alpha})`;
    ctx.fill();
  }
  _taraBlob.raf=requestAnimationFrame(_taraDrawBlob);
}

function _taraStartBlob(){
  if(_taraBlob.raf) return;
  _taraDrawBlob();
}

async function taraSpeak(text){
  if(!text||text.length<2) return;
  if(TARA_MUTED) return;
  // strip markdown/html tags for TTS
  const clean=text.replace(/<[^>]+>/g,' ').replace(/[*_`#\[\]]/g,'').replace(/\s+/g,' ').trim().slice(0,500);
  try{
    if(_taraBlob.audioCtx){try{_taraBlob.audioCtx.close();}catch(e){} _taraBlob.audioCtx=null;_taraBlob.analyser=null;_taraBlob.freqData=null;}
    const res=await fetch(TARA_VOICE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+TARA_SUPABASE_ANON},
      body:JSON.stringify({text:clean})
    });
    if(!res.ok) return;
    const buf=await res.arrayBuffer();
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    _taraBlob.audioCtx=ac;
    const analyser=ac.createAnalyser();
    analyser.fftSize=512;
    _taraBlob.analyser=analyser;
    _taraBlob.freqData=new Uint8Array(analyser.frequencyBinCount);
    const decoded=await ac.decodeAudioData(buf);
    const src=ac.createBufferSource();
    src.buffer=decoded;
    src.connect(analyser);
    analyser.connect(ac.destination);
    src.start();
    src.onended=()=>{_taraBlob.analyser=null;_taraBlob.freqData=null;_taraBlob.speakTarget=0;};
  }catch(e){console.warn('TARA voice error:',e);}
}

function taraStartVoiceOnly(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    showToast('Voice not supported on this browser — use Chrome');
    toggleTara();
    return;
  }
  // If already listening, stop
  if(_taraVoiceRecognition){
    _taraVoiceRecognition.stop();
    _taraVoiceRecognition = null;
    _taraBlob.speakTarget = 0;
    _taraHideListeningHint();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  _taraVoiceRecognition = rec;
  _taraBlob.speakTarget = 0.5;
  _taraShowListeningHint();

  rec.onstart = () => {
    _taraBlob.speakTarget = 0.5;
  };

  rec.onresult = async (e) => {
    const transcript = e.results[0][0].transcript;
    _taraBlob.speakTarget = 0;
    _taraVoiceRecognition = null;
    _taraHideListeningHint();
    showToast('🎤 "' + transcript + '"');
    await taraVoiceOnlyReply(transcript);
  };

  rec.onerror = (e) => {
    _taraBlob.speakTarget = 0;
    _taraVoiceRecognition = null;
    _taraHideListeningHint();
    if(e.error === 'no-speech') showToast('No speech detected — tap blob and try again');
    else if(e.error === 'not-allowed') showToast('Microphone blocked — check browser permissions');
    else showToast('Mic error: ' + e.error);
  };

  rec.onend = () => {
    _taraBlob.speakTarget = 0;
    _taraHideListeningHint();
    if(_taraVoiceRecognition){ _taraVoiceRecognition = null; }
  };

  try { rec.start(); } catch(e){ showToast('Could not start mic: ' + e.message); }
}

// ── COMPUTE ALERTS from live portal data ──
function computeTaraAlerts(){
  const alerts = [];

  // Late orders — processing > 2 days
  const now = new Date();
  (ORDERS||[]).filter(o=>o.status==='processing').forEach(o=>{
    const d = new Date(o.date);
    const days = Math.floor((now-d)/(1000*60*60*24));
    if(days>=2){
      const c = CUSTOMERS.find(x=>x.id===o.custId);
      alerts.push({type:'late_order', severity:'high',
        msg:`Order ${o.id} (${c?.name||o.custId}) has been processing for ${days} days with no completion.`,
        action:'view_order', data:o.id});
    }
  });

  // Unassigned orders
  (ORDERS||[]).filter(o=>o.status==='pending'&&!o.assignedTo).forEach(o=>{
    const c = CUSTOMERS.find(x=>x.id===o.custId);
    alerts.push({type:'unassigned', severity:'medium',
      msg:`Order ${o.id} (${c?.name||o.custId} · ${o.type}) has no employee assigned.`,
      action:'assign_order', data:o.id});
  });

  // Trucks in progress (receiving)
  TRUCKS_INPROGRESS.filter(t=>t.status==='receiving').forEach(t=>{
    const incomplete = t.pallets.filter(p=>p.stage<2).length;
    if(incomplete>0){
      const c = CUSTOMERS.find(x=>x.id===t.custId);
      alerts.push({type:'receiving_incomplete', severity:'medium',
        msg:`${t.name} (${c?.name||t.custId}) — ${incomplete} pallet${incomplete>1?'s':''} still need full inspection before receiving is complete.`,
        action:'view_truck', data:t.id});
    }
  });

  // Low supplies
  (SUPPLIES||[]).filter(s=>s.qty<=s.lowThreshold).forEach(s=>{
    alerts.push({type:'low_supply', severity: s.qty<=s.criticalThreshold?'high':'medium',
      msg:`${s.name} is ${s.qty<=s.criticalThreshold?'critically':'running'} low — ${s.qty} ${s.unit} remaining.`,
      action:'view_supplies', data:s.id});
  });

  // EDI fine risks
  (EDI_PO_INBOX||[]).filter(p=>p.status==='pending'&&p.partner==='Home Depot').forEach(p=>{
    alerts.push({type:'edi_fine', severity:'high',
      msg:`Home Depot PO ${p.poNum} has not been acknowledged — risk of $250 late ASN fine.`,
      action:'view_edi', data:p.id});
  });

  return alerts;
}

    html += `

        <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:${a.severity==='high'?'#ff6b6b':'#ffaa5e'};margin-bottom:4px">

        </div>
        ${a.msg}
        <br>
        <span class="tara-action" onclick="taraHandleAction('${a.action}','${a.data||''}')">View →</span>
      </div>`;
  });

  if(alerts.length>3){
    html+=`<div style="color:rgba(255,255,255,0.3);font-size:11px;text-align:center">+${alerts.length-3} more alerts</div>`;
  }

  // In-progress trucks
  inProgress.forEach(t=>{
    const done = t.pallets.filter(p=>p.stage>=2).length;
    const total = t.pallets.length;
    const pct = Math.round(done/total*100);
    html+=`
      <div class="tara-msg" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 13px">

        </div>
        <div style="background:rgba(255,255,255,0.08);border-radius:4px;height:4px;margin-bottom:8px">
          <div style="background:var(--red);height:4px;border-radius:4px;width:${pct}%;transition:width 0.3s"></div>

        <span class="tara-action tara-action-green" onclick="taraNotifyCustomer('${t.id}')">Notify Customer</span>

  });

  return html;
}

// ── SEND MESSAGE TO TARA ──
let _taraConv = [];
async function sendToTara(){
  const input = document.getElementById('taraInput');
  const msgs = document.getElementById('taraMessages');
  if(!input||!msgs) return;
  const text = input.value.trim();
  if(!text) return;
  input.value='';

  // Add user message
  msgs.innerHTML += `<div class="tara-msg tara-user-msg">${text}</div>`;

  // Thinking
  const thinkId = 'tt_'+Date.now();
  msgs.innerHTML += `<div id="${thinkId}" class="tara-msg tara-ai-msg" style="color:rgba(255,255,255,0.3)">
    <span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Thinking…
  </div>`;
  msgs.scrollTop = msgs.scrollHeight;

  _taraConv.push({role:'user', content:text});

  // Detect intent before sending to AI
  const lower = text.toLowerCase();
  const isTruckLog = lower.includes('truck')||lower.includes('pallet')||lower.includes('received')||lower.includes('just got')||lower.includes('came in');
  const isEmail = lower.includes('email')||lower.includes('send')||lower.includes('notify')||lower.includes('let them know');
  const isQuestion = lower.includes('?')||lower.startsWith('what')||lower.startsWith('how')||lower.startsWith('when')||lower.startsWith('who')||lower.startsWith('show');

  const inProgress = TRUCKS_INPROGRESS.filter(t=>t.status==='receiving');

  const system = `You are TARA, the AI warehouse assistant for ShiplyCo 3PL in Houston, TX. You are direct, precise, and honest. Warehouse workers are busy — keep responses short and action-oriented.

CRITICAL RULES:
- Only state facts you can see in the data provided below. Never guess, assume, or make things up.
- If you don't have the data to answer something, say it naturally like a coworker would — e.g. "Nothing's showing up for him right now", "She's not on anything at the moment", "That's not in the system yet." Never say "I don't have that info" — it sounds robotic.
- Never say "it's possible", "probably", "might be", "I've checked and..." unless you actually have the data to back it up.
- If asked about a specific employee's task and you have no assignment data, say "[Name] isn't assigned to anything right now." Be helpful and suggest what they could be assigned to if relevant.

You can:
1. Parse truck/receiving info from natural speech and return structured JSON prefixed with [TRUCK_DATA]
2. Draft customer notification emails prefixed with [EMAIL_DRAFT]
3. Answer questions about warehouse data — only what is in the context below
4. Flag issues and anomalies

Current warehouse context:
- Trucks in progress: ${JSON.stringify(inProgress.map(t=>({id:t.id,name:t.name,pallets:t.pallets.length,done:t.pallets.filter(p=>p.stage>=2).length,receivedBy:t.receivedBy})))}
- Active alerts: ${TARA_ALERTS.length}
- Customers: ${CUSTOMERS.map(c=>c.name).join(', ')}
- Orders: ${(ORDERS||[]).slice(0,10).map(o=>({id:o.id,status:o.status,assignedTo:o.assignedTo||'unassigned',custId:o.custId})).join(', ')}
- Today: ${new Date().toLocaleDateString()}

If the user is describing a truck arriving, extract: customer name, truck number, pallet count, origin/store, and any items visible on boxes. Return as [TRUCK_DATA]{...json...}

If asked to send an email/notification, draft it and prefix with [EMAIL_DRAFT]

For all other questions, answer in 1-2 sentences max. Be precise. No fluff.`;

  await callAI(_taraConv, system, null, (reply, err)=>{
    const thinkEl = document.getElementById(thinkId);
    if(thinkEl) thinkEl.remove();

    if(err){
      msgs.innerHTML+=`<div class="tara-msg tara-alert">⚠ ${err}</div>`;
      return;
    }

    _taraConv.push({role:'assistant', content:reply});

    // Handle structured responses
    if(reply.includes('[TRUCK_DATA]')){
      handleTaraTruckData(reply, msgs);
    } else if(reply.includes('[EMAIL_DRAFT]')){
      handleTaraEmailDraft(reply, msgs);
    } else {
      msgs.innerHTML+=`<div class="tara-msg tara-ai-wrap"><div class="tara-orb"></div><div class="tara-ai-msg">${reply.replace(/\n/g,'<br>')}</div></div>`;
      taraSpeak(reply);
    }
    msgs.scrollTop = msgs.scrollHeight;
  });
}

// ── HANDLE TRUCK DATA from TARA ──
function handleTaraTruckData(reply, msgs){
  try {
    const jsonStr = reply.match(/\[TRUCK_DATA\]([\s\S]+)/)?.[1]?.trim();
    const data = JSON.parse(jsonStr||'{}');
    const truckId = 'TIP-'+(Date.now()%10000).toString().padStart(3,'0');
    const cust = CUSTOMERS.find(c=>c.name?.toLowerCase().includes((data.customer||'').toLowerCase()))||CUSTOMERS[0];

    // Build draft pallets from items TARA parsed
    const draftPallets = [];
    const palletCount = parseInt(data.pallets)||1;
    const items = data.items||[{brand:'Unknown',category:'Mixed',type:'Mixed'}];
    for(let i=1;i<=Math.min(palletCount,8);i++){
      const item = items[(i-1)%items.length]||items[0];
      draftPallets.push({
        num:i, stage:1, loc:'',
        items:[{itemNum:'', brand:item.brand||'', dept:item.dept||'', category:item.category||'', type:item.type||'',
                upc:'', sku:'', desc:'', color:'', size:'', cases:'', casepack:'', units:'', cond:'', notes:''}]
      });
    }
    if(palletCount>8){
      for(let i=9;i<=palletCount;i++) draftPallets.push({num:i,stage:1,loc:'',items:[{brand:'',category:'',type:'',upc:'',sku:'',desc:'',color:'',size:'',cases:'',casepack:'',units:'',cond:'',notes:''}]});
    }

    const newTruck = {
      id:truckId, name:data.truckName||`Truck #${TRUCKS_INPROGRESS.length+4}`,
      custId:cust?.id||'platinum', date:new Date().toLocaleDateString(),
      origin:data.origin||'', store:data.store||'',
      totalPallets:palletCount, bol:'', receipt:'',
      status:'receiving', receivedBy:currentEmployee||'Unknown', notes:'',
      pallets:draftPallets
    };

    TRUCKS_INPROGRESS.push(newTruck);

    msgs.innerHTML+=`
      <div class="tara-msg tara-ai-msg">
        ✅ <strong>Got it.</strong> I've started a receiving log for <strong>${newTruck.name}</strong> — ${palletCount} pallets, ${cust?.name||'customer'}.
        <br><br>
        ${draftPallets.slice(0,3).map(p=>`<div style="font-size:11px;opacity:0.6;margin-top:2px">Pallet ${p.num}: ${p.items[0]?.brand||'?'} ${p.items[0]?.category||''} ${p.items[0]?.type||''}</div>`).join('')}
        ${palletCount>3?`<div style="font-size:11px;opacity:0.4">+${palletCount-3} more pallets added as blanks</div>`:''}
        <br>
        <span class="tara-action" onclick="showPage('entry');toggleTara()">Open Receiving Form →</span>
        <span class="tara-action tara-action-green" onclick="taraNotifyCustomer('${truckId}')">Notify Customer</span>
      </div>`;

    // Refresh TARA button
    setTimeout(()=>injectTara(), 500);

  } catch(e){
    msgs.innerHTML+=`<div class="tara-msg tara-ai-msg">${reply.replace('[TRUCK_DATA]','').replace(/\n/g,'<br>')}</div>`;
  }
}

// ── NOTIFY CUSTOMER about truck ──
async function taraNotifyCustomer(truckId){
  const truck = TRUCKS_INPROGRESS.find(t=>t.id===truckId);
  if(!truck){showToast('Truck not found');return;}
  const cust = CUSTOMERS.find(c=>c.id===truck.custId);
  const items = [...new Set(truck.pallets.flatMap(p=>p.items.map(i=>i.brand||i.category||i.type)).filter(Boolean))];
  const done = truck.pallets.filter(p=>p.stage>=2).length;

  const msgs = document.getElementById('taraMessages');
  if(msgs) msgs.innerHTML+=`<div class="tara-msg" style="color:rgba(255,255,255,0.4);font-size:12px">⏳ Drafting customer update…</div>`;

  const system=`You are drafting a professional, brief receiving notification email from ShiplyCo 3PL to a customer. Be warm but concise. Subject line first, then body. Sign off as "ShiplyCo Receiving Team".`;
  await callAI([{role:'user',content:`Draft a receiving notification email to ${cust?.name||'the customer'}.
Truck: ${truck.name}
Date received: ${truck.date}
Origin: ${truck.origin||'Texas'}
Total pallets: ${truck.totalPallets}
Pallets fully inspected so far: ${done} of ${truck.pallets.length}
Items visible on boxes: ${items.join(', ')||'Mixed merchandise'}
Status: ${truck.status==='received'?'Fully received and in inventory':'Receiving in progress — full count coming soon'}

Keep it to 3-4 sentences. Professional but friendly.`}],
    system, null, (reply,err)=>{
      const msgs=document.getElementById('taraMessages');
      if(!msgs) return;
      // Remove thinking msg
      const last=msgs.lastElementChild;
      if(last&&last.textContent.includes('Drafting')) last.remove();
      if(err){msgs.innerHTML+=`<div class="tara-msg tara-alert">⚠ ${err}</div>`;return;}
      handleTaraEmailDraft('[EMAIL_DRAFT]'+reply, msgs);
      msgs.scrollTop=msgs.scrollHeight;
    });
}

// ── VOICE INPUT ──
function toggleTaraVoice(){
  const btn = document.getElementById('taraMicBtn');
  const input = document.getElementById('taraInput');

  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast('⚠ Voice input not supported in this browser — try Chrome');
    return;
  }

  if(TARA_VOICE_ACTIVE){
    if(_taraRecognition) _taraRecognition.stop();
    TARA_VOICE_ACTIVE=false;
    if(btn){btn.textContent='🎤';btn.style.background='rgba(255,255,255,0.06)';}
    return;
  }

  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  _taraRecognition = new SR();
  _taraRecognition.continuous = false;
  _taraRecognition.interimResults = false;
  _taraRecognition.lang = 'en-US';

  _taraRecognition.onstart = ()=>{
    TARA_VOICE_ACTIVE=true;
    if(btn){btn.textContent='🔴';btn.style.background='rgba(232,36,26,0.2)';}
    if(input) input.placeholder='Listening…';
  };
  _taraRecognition.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    if(input) input.value=transcript;
    sendToTara();
  };
  _taraRecognition.onend = ()=>{
    TARA_VOICE_ACTIVE=false;
    if(btn){btn.textContent='🎤';btn.style.background='rgba(255,255,255,0.06)';}
    if(input) input.placeholder='Tell TARA what\'s coming off the truck…';
  };
  _taraRecognition.onerror = (e)=>{
    TARA_VOICE_ACTIVE=false;
    if(btn){btn.textContent='🎤';btn.style.background='rgba(255,255,255,0.06)';}
    showToast('⚠ Voice input error — try again');
  };
  _taraRecognition.start();
}

function saveNewTruck(){

  const custId = document.getElementById('nt_cust')?.value||'platinum';
  const date = document.getElementById('nt_date')?.value||new Date().toLocaleDateString();
  const origin = document.getElementById('nt_origin')?.value||'TX';
  const store = document.getElementById('nt_store')?.value||'';
  const totalPallets = parseInt(document.getElementById('nt_pallets')?.value)||_ntPalletCount;

  const pallets=[];
  for(let i=1;i<=_ntPalletCount;i++){

    const dept=document.getElementById(`nt_dept_${i}`)?.value||'';

    pallets.push({num:i,stage:1,loc,items:[{itemNum,brand,dept,category:cat,type,upc:'',sku:'',desc:'',color:'',size:'',cases:'',casepack:'',units:'',cond:'',notes:''}]});

  // Add blank rows for remaining pallets
  for(let i=_ntPalletCount+1;i<=totalPallets;i++){
    pallets.push({num:i,stage:1,loc:'',items:[{itemNum:'',brand:'',dept:'',category:'',type:'',upc:'',sku:'',desc:'',color:'',size:'',cases:'',casepack:'',units:'',cond:'',notes:''}]});
  }

  const truckId='TIP-'+(Date.now()%10000).toString().padStart(3,'0');
  TRUCKS_INPROGRESS.push({id:truckId,name,custId,date:new Date(date).toLocaleDateString(),origin,store,totalPallets,bol:'',receipt:'',status:'receiving',receivedBy:currentEmployee||'',notes:'',pallets});

  return `

      <div style="font-size:10px;color:var(--ink3)">${[item.dept?'Dept '+item.dept:'',item.category,item.type].filter(Boolean).join(' · ')||'—'}</div>

function calcInspUnits(idx){
  const cases=parseFloat(document.getElementById(`insp_cases_${idx}`)?.value)||0;
  const cp=parseFloat(document.getElementById(`insp_cp_${idx}`)?.value)||0;
  const u=document.getElementById(`insp_units_${idx}`);
  if(u&&cases&&cp) u.value=cases*cp;
}

function savePalletInspection(){
  const truck=TRUCKS_INPROGRESS.find(t=>t.id===_inspectTruckId);
  const pallet=truck?.pallets.find(p=>p.num===_inspectPalletNum);
  if(!pallet)return;

  pallet.loc = document.getElementById('insp_loc')?.value||pallet.loc;
  pallet.stage = 2;
  pallet.items = [];

  // Collect all items
  let idx=0;
  while(document.getElementById(`insp_desc_${idx}`)!==null){
    pallet.items.push({
      itemNum: document.getElementById(`insp_sku_${idx}`)?.value||'',
      upc:  document.getElementById(`insp_upc_${idx}`)?.value||'',
      sku:  document.getElementById(`insp_sku_${idx}`)?.value||'',
      desc: document.getElementById(`insp_desc_${idx}`)?.value||'',
      color:document.getElementById(`insp_color_${idx}`)?.value||'',
      size: document.getElementById(`insp_size_${idx}`)?.value||'',
      cases:parseFloat(document.getElementById(`insp_cases_${idx}`)?.value)||0,
      casepack:parseFloat(document.getElementById(`insp_cp_${idx}`)?.value)||0,
      units:parseFloat(document.getElementById(`insp_units_${idx}`)?.value)||0,
      cond: document.getElementById(`insp_cond_${idx}`)?.value||'New',
      notes:document.getElementById(`insp_notes_${idx}`)?.value||'',
    });
    idx++;
  }

  document.getElementById('palletInspectModal').style.display='none';
  showToast(`✓ Pallet ${_inspectPalletNum} inspection complete`);
  injectTara();
  showPage('entry');
}

function markTruckFullyReceived(truckId){
  const truck=TRUCKS_INPROGRESS.find(t=>t.id===truckId);
  if(!truck)return;
  const incomplete=truck.pallets.filter(p=>p.stage<2).length;
  if(incomplete>0){
    confirmAction(`${incomplete} pallet${incomplete>1?'s are':' is'} not fully inspected yet. Mark as received anyway?`,()=>{
      truck.status='received';
      showToast(`✓ ${truck.name} marked fully received`);
      injectTara();
      showPage('entry');
    });
    return;
  }
  truck.status='received';
  showToast(`✅ ${truck.name} fully received — inventory updated`);
  // Add to TRUCKS array for history
  TRUCKS.push({id:truckId,name:truck.name,date:truck.date,origin:truck.origin,pallets:truck.pallets.length,units:truck.pallets.flatMap(p=>p.items).reduce((s,i)=>s+(i.units||0),0),bol:truck.bol});
  injectTara();
  showPage('entry');
}

// ── NOTIFICATION SYSTEM ──
function toggleNotif(){
  const p=document.getElementById('notifPanel');
  p.classList.toggle('open');
  renderNotifs();
}
function renderNotifs(){
  const list=document.getElementById('notifList');
  const myNotifs=NOTIFICATIONS.filter(n=>role==='customer'||role==='admin');
  if(!myNotifs.length){list.innerHTML='<div class="notif-empty">No notifications</div>';return;}
  list.innerHTML=myNotifs.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}" onclick="readNotif('${n.id}')">
      <div>${n.text}</div>
      <div class="notif-time">${n.time}</div>
    </div>`).join('');
}
function readNotif(id){
  const n=NOTIFICATIONS.find(x=>x.id===id);
  if(n)n.read=true;
  updateBadge();
  renderNotifs();
}
function markAllRead(){NOTIFICATIONS.forEach(n=>n.read=true);updateBadge();renderNotifs()}
function updateBadge(){
  const unread=NOTIFICATIONS.filter(n=>!n.read).length;
  const badge=document.getElementById('notifBadge');
  badge.textContent=unread;
  badge.style.display=unread?'flex':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#notifBell')&&!e.target.closest('#notifPanel')){
    document.getElementById('notifPanel').classList.remove('open');
  }
});

function pushNotif(text){
  NOTIFICATIONS.unshift({id:'N'+Date.now(),text,time:'Just now',read:false});
  updateBadge();
}

async function submitOrderToSb(type){
  const btn = event.target;
  btn.disabled=true; btn.textContent='Submitting…';

  // Collect items for pick & pack
  let items=[];
  if(type==='pickpack'){
    document.querySelectorAll('[id^="ppitem-"]').forEach(row=>{
      const inputs=row.querySelectorAll('input');
      const desc=inputs[0]?.value?.trim(), qty=+inputs[1]?.value||1;
      if(desc) items.push({desc, qty});
    });
  }

  const order = {
    cust_id: currentUser?.cust_id||currentEmployee?.cust_id||'platinum',
    type,
    status: 'pending',
    channel: selChannel||(_oCarrier)||null,
    date: document.getElementById('pickupDate')?.value||null,
    time: selTime||null,
    notes: document.getElementById('orderNotes')?.value?.trim()||null,
    items: items.length?items:null,
    carrier: _oCarrier||null,
    fc_code: document.getElementById('fcCode')?.value?.trim()||null,
    fba_shipment_id: document.getElementById('fbaShipmentId')?.value?.trim()||null,
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };

  const {data, error} = await sb.from('orders').insert([order]).select().single();
  if(error){
    showToast('⚠ '+error.message);
    btn.disabled=false; btn.textContent='Submit Order →';
    return;
  }

  btn.textContent='✓ Order Submitted!';
  btn.style.background='var(--green)';
  showToast(`✓ Order ${data.id||''} submitted — we'll fulfill within 24–48 hours`);
  selOrderType=null; selPallets=[]; selTime=null; selChannel=null; _oCarrier=null;
  setTimeout(()=>showPage('myorders'), 1400);
}

async function loadOrdersFromSb(){
  const isStaff = role==='employee'||role==='admin';
  let query = sb.from('orders').select('*').order('date', {ascending:false});
  if(!isStaff){
    // Customer only sees their own orders
    const {data:prof} = await sb.from('profiles').select('customer_id').eq('id',(await sb.auth.getUser()).data.user?.id).single();
    if(prof?.customer_id) query = query.eq('cust_id', prof.customer_id);
  }

  if(error){ showToast('⚠ Error loading orders: '+error.message); return []; }

function renderOrdersPage(orders){
  const wrap = document.getElementById('ordersPageWrap');
  if(!wrap) return;
  const isStaff = role==='employee'||role==='admin';
  const steps = ['Pending','Processed','Picked Up'];
  const stepKey = ['pending','processed','picked_up'];
  const typeIcons = {pallet_out:'🚚',pickpack:'📦',fbm:'📦',fba:'🏭',marketplace:'📦'};
  const typeLabels = {pallet_out:'Pallet Pickup',pickpack:'Pick & Pack',fbm:'Pick & Pack',fba:'FBA Prep',marketplace:'Pick & Pack'};

  const filterStatus = document.getElementById('ordersStatusFilter')?.value||'all';
  const filterSearch = document.getElementById('ordersSearch')?.value?.toLowerCase()||'';
  let list = orders;
  if(filterStatus!=='all') list = list.filter(o=>o.status===filterStatus);
  if(filterSearch) list = list.filter(o=>o.id?.toLowerCase().includes(filterSearch)||o.channel?.toLowerCase().includes(filterSearch)||o.type?.toLowerCase().includes(filterSearch));

  // Update stat counts
  document.getElementById('oStatPending').textContent  = orders.filter(o=>o.status==='pending').length;
  document.getElementById('oStatProcessed').textContent= orders.filter(o=>o.status==='processed').length;
  document.getElementById('oStatDone').textContent     = orders.filter(o=>o.status==='picked_up').length;

  if(!list.length){
    wrap.innerHTML=`<div style="padding:40px;text-align:center;color:var(--ink3)">No orders found</div>`;
    return;
  }

  wrap.innerHTML = list.map(o=>{
    const curStep = stepKey.indexOf(o.status);
    const items = Array.isArray(o.items)?o.items:(typeof o.items==='string'?JSON.parse(o.items||'[]'):[]);
    const cust = CUSTOMERS.find(c=>c.id===o.cust_id);
    return `<div class="order-card">
      <div class="order-card-head">
        <div>
          <div class="order-id">${typeIcons[o.type]||'📦'} ${o.id} · ${typeLabels[o.type]||o.type}</div>
          <div class="order-meta">${cust?.name||o.cust_id||'—'} · ${o.channel||'—'} · ${o.date||'—'}${o.time?' · '+o.time+' slot':''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="tag ${o.status==='picked_up'?'tg':o.status==='processed'?'tb':'to'}">${(o.status||'').replace('_',' ').toUpperCase()}</span>
        </div>
      </div>
      <div style="padding:13px 18px">
        ${o.notes?`<div style="font-size:12px;color:var(--ink3);margin-bottom:8px">📝 ${o.notes}</div>`:''}
        ${o.pallets?`<div style="font-size:13px;color:var(--ink2);margin-bottom:8px">${o.pallets} pallet${o.pallets>1?'s':''}</div>`:''}
        ${items.length?`<div style="font-size:12px;color:var(--ink2);margin-bottom:8px">${items.map(i=>`${i.desc||i.sku} × ${i.qty}`).join(', ')}</div>`:''}
        <div class="status-track">
          ${steps.map((s,i)=>`
            ${i>0?`<div class="st-line ${i<=curStep?'done':''}"></div>`:''}
            <div class="st-step ${i<curStep?'done':i===curStep?'active':''}">
              <div class="st-dot">${i<curStep?'✓':i+1}</div>
              <span style="white-space:nowrap">${s}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderDispatchBoard(orders){
  const wrap = document.getElementById('dispatchWrap');
  if(!wrap) return;

  // Update stats
  const unassigned = orders.filter(o=>!o.assigned_to);
  const inProgress = orders.filter(o=>o.assigned_to && o.status==='pending');
  const processed  = orders.filter(o=>o.status==='processed');
  document.getElementById('dStatOpen').textContent        = orders.length;
  document.getElementById('dStatUnassigned').textContent  = unassigned.length;
  document.getElementById('dStatInProgress').textContent  = inProgress.length;
  document.getElementById('dStatProcessed').textContent   = processed.length;

  if(!orders.length){
    wrap.innerHTML=`<div style="text-align:center;padding:60px;color:var(--ink3)"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-weight:700;font-size:16px">No open orders right now</div></div>`;
    return;
  }

  const typeIcons  = {pallet_out:'🚚',pickpack:'📦',fbm:'📦',fba:'🏭',marketplace:'📦'};
  const typeLabels = {pallet_out:'Pallet Outbound',pickpack:'Pick & Pack',fbm:'Pick & Pack',fba:'FBA Prep',marketplace:'Pick & Pack'};

  // Group: Unassigned first, then by assignee
  const groups = {};
  orders.forEach(o=>{
    const key = o.assigned_to||'__unassigned__';
    if(!groups[key]) groups[key]=[];
    groups[key].push(o);
  });

  let html = '';

  // Unassigned section
  if(groups['__unassigned__']?.length){
    html += `
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:10px">
      ⚠ Unassigned — ${groups['__unassigned__'].length} order${groups['__unassigned__'].length>1?'s':''} need someone
    </div>`;
    groups['__unassigned__'].forEach(o=>{
      const cust = CUSTOMERS.find(c=>c.id===o.cust_id);
      html += `
      <div class="card" style="margin-bottom:10px;border-left:4px solid var(--orange)">
        <div style="padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${typeIcons[o.type]||'📦'} ${o.id}</span>
              <span class="tag to">${(o.status||'pending').replace('_',' ')}</span>
              <span style="font-size:11px;color:var(--orange);font-weight:700;background:var(--orange-bg);padding:2px 8px;border-radius:4px">⚠ Unassigned</span>
            </div>
            <div style="font-size:13px;font-weight:600;color:var(--ink2)">${cust?.name||o.cust_id} · ${typeLabels[o.type]||o.type}</div>
            <div style="font-size:12px;color:var(--ink3);margin-top:2px">${o.date||'—'} ${o.time?'· '+o.time+' slot':''} ${o.channel?'· '+o.channel:''}</div>
            ${o.notes?`<div style="font-size:12px;color:var(--ink3);margin-top:2px">📝 ${o.notes}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            ${role==='employee'
              ? `<button class="btn btn-red" style="font-size:12px;padding:7px 16px" onclick="sbClaimOrder('${o.id}')">＋ Claim</button>`
              : `<select onchange="sbAssignOrder('${o.id}',this.value);this.value=''"
                  style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-family:Barlow,sans-serif;font-size:12px;font-weight:600">
                  <option value="">Assign to…</option>
                  ${EMPLOYEES.map(e=>`<option value="${e.name}">${e.name}</option>`).join('')}
                </select>`
            }
          </div>
        </div>
      </div>`;
    });
    delete groups['__unassigned__'];
  }

  // Assigned sections
  Object.entries(groups).forEach(([empName, empOrders])=>{
    html += `
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-top:18px;margin-bottom:10px">
      👷 ${empName} — ${empOrders.length} order${empOrders.length>1?'s':''}
    </div>`;
    empOrders.forEach(o=>{
      const cust = CUSTOMERS.find(c=>c.id===o.cust_id);
      const items = Array.isArray(o.items)?o.items:(typeof o.items==='string'?JSON.parse(o.items||'[]'):[]);
      html += `
      <div class="card" style="margin-bottom:10px;border-left:4px solid var(--blue)">
        <div style="padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${typeIcons[o.type]||'📦'} ${o.id}</span>
              <span class="tag ${o.status==='processed'?'tb':'to'}">${(o.status||'pending').replace('_',' ')}</span>
            </div>
            <div style="font-size:13px;font-weight:600;color:var(--ink2)">${cust?.name||o.cust_id} · ${typeLabels[o.type]||o.type}</div>
            <div style="font-size:12px;color:var(--ink3);margin-top:2px">${o.date||'—'} ${o.time?'· '+o.time+' slot':''} ${o.channel?'· '+o.channel:''}</div>
            ${items.length?`<div style="font-size:12px;color:var(--ink2);margin-top:4px">${items.map(i=>`${i.desc||i.sku} × ${i.qty}`).join(', ')}</div>`:''}
            ${o.pallets?`<div style="font-size:12px;color:var(--ink2);margin-top:2px">${o.pallets} pallet${o.pallets>1?'s':''}</div>`:''}
            ${o.notes?`<div style="font-size:12px;color:var(--ink3);margin-top:2px">📝 ${o.notes}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            ${o.status==='pending'?`<button class="act-btn act-process" onclick="sbMarkOrderStatus('${o.id}','processed')">✓ Mark Processed</button>`:''}
            ${o.status==='processed'?`<button class="act-btn act-pickup" onclick="sbMarkOrderStatus('${o.id}','picked_up')">🚚 Mark Picked Up</button>`:''}
            ${role==='admin'
              ? `<select onchange="sbAssignOrder('${o.id}',this.value)"
                  style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:Barlow,sans-serif;font-size:11px">
                  <option value="${o.assigned_to||''}">${o.assigned_to||'Reassign…'}</option>
                  <option value="">— Unassign —</option>
                  ${EMPLOYEES.map(e=>`<option value="${e.name}">${e.name}</option>`).join('')}
                </select>`
              : `<button class="act-btn" style="font-size:11px" onclick="sbReleaseOrder('${o.id}')">↩ Release</button>`
            }
          </div>
        </div>
      </div>`;
    });
  });

  wrap.innerHTML = html;
}

async function refreshDispatch(){
  const wrap = document.getElementById('dispatchWrap');
  if(wrap) wrap.innerHTML=`<div style="padding:40px;text-align:center;color:var(--ink3)"><span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Refreshing…</div>`;
  _dispatchOrders = await loadDispatchOrders();
  renderDispatchBoard(_dispatchOrders);
}

// ── MY TASKS PAGE — tap to expand, fulfillment + pick directions inline ──
let _expandedOrder = null;

function pgMyTasks(){
  if(!currentEmployee){
    return `<div class="pg-head"><div class="pg-title">My Tasks</div></div>
    <div class="card" style="padding:40px;text-align:center;color:var(--ink3)">Log in as an employee to see your tasks.</div>`;
  }
  setTimeout(async()=>{
    const wrap = document.getElementById('myTasksWrap');
    if(!wrap) return;
    wrap.innerHTML=`<div style="padding:40px;text-align:center;color:var(--ink3)"><span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Loading…</div>`;
    await refreshMyTasks();
  }, 100);
  return `
  <div class="pg-head" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <div class="pg-title">My Tasks</div>
      <div class="pg-sub" id="myTaskSubtitle">Loading…</div>
    </div>
    <button class="btn" onclick="refreshMyTasks()">↻ Refresh</button>
  </div>
  <div id="myTasksWrap"></div>`;
}

async function refreshMyTasks(){
  const wrap = document.getElementById('myTasksWrap');
  if(!wrap) return;
  const [{data:mine},{data:unassigned}] = await Promise.all([
    sb.from('orders').select('*').eq('assigned_to',currentEmployee.name).not('status','eq','picked_up').order('date',{ascending:true}),
    sb.from('orders').select('*').is('assigned_to',null).not('status','eq','picked_up').order('date',{ascending:true})
  ]);
  const sub = document.getElementById('myTaskSubtitle');
  if(sub) sub.textContent=`${(mine||[]).length} active · ${(unassigned||[]).length} available to claim`;
  buildMyTasksHtml(mine||[], unassigned||[]);
}

function buildMyTasksHtml(mine, unassigned){
  const wrap = document.getElementById('myTasksWrap');
  if(!wrap) return;
  const typeIcons  = {pallet_out:'🚚',pickpack:'📦',fbm:'📦',fba:'🏭',marketplace:'📦'};
  const typeLabels = {pallet_out:'Pallet Outbound',pickpack:'Pick & Pack',fbm:'Pick & Pack',fba:'FBA Prep',marketplace:'Pick & Pack'};
  const STEPS = {
    pallet_out: ['Locate pallet in warehouse','Wrap & secure pallet','Apply outbound label','Stage at dock','Mark picked up'],
    pickpack:   ['Review pick list below','Pick all items by location','Pack into box','Apply shipping label','Mark complete'],
    fbm:        ['Review pick list below','Pick all items by location','Pack into box','Apply shipping label','Mark complete'],
    fba:        ['Review pick list below','Pick all items','Label each unit','Kit & box','Palletize for FBA','Mark complete'],
    marketplace:['Review pick list below','Pick items','Pack & label','Mark complete'],
  };
  let html = '';

  // ── MY CLAIMED ORDERS ──
  if(mine.length){
    html+=`<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:10px">My Orders (${mine.length})</div>`;
    mine.forEach(o=>{
      const cust   = CUSTOMERS.find(c=>c.id===o.cust_id);
      const steps  = STEPS[o.type]||STEPS.pickpack;
      const items  = Array.isArray(o.items)?o.items:(typeof o.items==='string'?JSON.parse(o.items||'[]'):[]);
      const isOpen = _expandedOrder===o.id;
      const stepDone = o.status==='processed'?steps.length-1:0;
      const pickLines = items.map(item=>{
        const inv = INVENTORY.find(l=>l.sku===item.sku||l.desc?.includes((item.desc||'').split(' ')[0]||'x'));
        return {loc:inv?.id||'—', desc:item.desc||item.sku||'', units:item.qty, sku:item.sku, openCase:inv?.openCase||false};
      });
      html+=`
      <div class="card" style="margin-bottom:10px;border-left:4px solid var(--red);overflow:hidden">
        <!-- Tap header to expand/collapse -->
        <div onclick="toggleTaskExpand('${o.id}')" style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px;background:${isOpen?'var(--red-light)':'var(--surface)'}">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${typeIcons[o.type]||'📦'} ${o.id}</span>
              <span class="tag ${o.status==='processed'?'tb':'to'}" style="font-size:11px">${(o.status||'').replace('_',' ')}</span>
              ${stepDone>0?`<span style="font-size:11px;color:var(--green);font-weight:700">Step ${stepDone}/${steps.length-1} done</span>`:''}
            </div>
            <div style="font-size:13px;font-weight:600;color:var(--ink2)">${cust?.name||o.cust_id} · ${typeLabels[o.type]||o.type} ${o.date?'· '+o.date:''} ${o.time?'· '+o.time+' slot':''}</div>
          </div>
          <span style="font-size:20px;color:var(--ink3);${isOpen?'transform:rotate(180deg)':''}">⌄</span>
        </div>
        ${isOpen?`
        <div style="border-top:1px solid var(--border);padding:16px 18px;background:var(--bg)">
          ${items.length?`<div style="font-size:12px;color:var(--ink2);margin-bottom:14px;padding:10px 12px;background:var(--surface);border-radius:7px;border:1px solid var(--border)"><strong>Items:</strong> ${items.map(i=>`${i.desc||i.sku} × ${i.qty}`).join(', ')}</div>`:''}
          ${o.notes?`<div style="font-size:12px;color:var(--ink3);margin-bottom:12px">📝 ${o.notes}</div>`:''}
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-bottom:10px">Fulfillment Steps</div>
          ${steps.map((step,i)=>{
            const done=i<stepDone, active=i===stepDone, isLast=i===steps.length-1;
            // Determine what action this step needs
            const isScanStep   = step.toLowerCase().includes('locate') || step.toLowerCase().includes('find');
            const isPickStep   = step.toLowerCase().includes('pick');
            const isCompleteStep = isLast;
            return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;
                        background:${done?'var(--green-bg)':active?'var(--red-light)':'var(--surface)'};
                        border:1px solid ${done?'var(--green)':active?'var(--red)':'var(--border)'}">
              <div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;
                          background:${done?'var(--green)':active?'var(--red)':'var(--border)'};color:${done||active?'#fff':'var(--ink3)'}">
                ${done?'✓':i+1}
              </div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:${active?'700':'500'};color:${done?'var(--green)':active?'var(--ink)':'var(--ink3)'};${done?'text-decoration:line-through':''}">
                  ${step}
                </div>
                ${active && isScanStep ? `
                <div style="margin-top:10px">
                  <div style="font-size:11px;color:var(--ink3);margin-bottom:6px">Scan pallet barcode — or type it manually if no scanner connected</div>
                  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <input type="text" id="scanInput_${o.id}_${i}"
                      placeholder="Scan or type barcode…"
                      autofocus
                      style="flex:1;min-width:160px;padding:9px 12px;border:2px solid var(--red);border-radius:8px;font-family:monospace;font-size:14px;font-weight:700;outline:none"
                      onkeydown="if(event.key==='Enter')confirmScan('${o.id}',${i},${steps.length},this.value)"
                    />
                    <button class="btn btn-red" style="font-size:12px;padding:9px 16px;flex-shrink:0"
                      onclick="confirmScan('${o.id}',${i},${steps.length},document.getElementById('scanInput_${o.id}_${i}').value)">
                      ✓ Confirm
                    </button>
                    ${('BarcodeDetector' in window)?`
                    <button class="btn" style="font-size:12px;padding:9px 14px;flex-shrink:0" onclick="openCameraScanner('${o.id}',${i},${steps.length})" title="Use camera">
                      📷 Camera
                    </button>`:''}
                  </div>
                  <div id="scanResult_${o.id}_${i}" style="margin-top:6px;font-size:12px;display:none"></div>
                </div>`
                : active && isCompleteStep ? `
                <div style="margin-top:8px">
                  <button class="btn btn-red" style="font-size:12px;padding:8px 18px" onclick="sbMarkOrderStatus('${o.id}','picked_up');_expandedOrder=null">✅ Mark Complete</button>
                </div>`
                : active ? `
                <div style="margin-top:8px">
                  <button class="act-btn act-process" style="font-size:12px" onclick="markStepDone(event,'${o.id}',${i},${steps.length})">✓ Done</button>
                </div>` : done ? `<div style="font-size:11px;color:var(--green);margin-top:2px">✓ Completed</div>` : ''}
              </div>
            </div>`;
          }).join('')}
          ${pickLines.length?`
          <div style="margin-top:16px">
            <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-bottom:10px">📍 Pick Directions</div>
            ${pickLines.map((d,i)=>`
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid ${d.openCase?'var(--orange)':i===0?'var(--red)':'var(--border)'};border-radius:8px;margin-bottom:6px;background:${d.openCase?'var(--orange-bg)':i===0?'var(--red-light)':'var(--surface)'}">
              <span style="font-family:monospace;font-size:14px;font-weight:900;color:var(--red);min-width:70px">${d.loc}</span>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600">${d.desc}</div>
                <div style="font-size:11px;color:var(--ink3)">Pick ${d.units} unit${d.units!==1?'s':''}${d.sku?' · '+d.sku:''}</div>
                ${d.openCase?`<div style="font-size:11px;color:var(--orange);font-weight:700">⚠ Open case — pick loose units first</div>`:''}
              </div>
              <button class="act-btn" style="font-size:11px" onclick="confirmPickLine(this,'${o.id}')">✓ Picked</button>
            </div>`).join('')}
          </div>`:''}
          <div style="margin-top:14px;text-align:right">
            <button class="btn" style="font-size:11px" onclick="sbReleaseOrder('${o.id}')">↩ Release Order</button>
          </div>
        </div>`:''}
      </div>`;
    });
  } else {
    html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;text-align:center;color:var(--ink3);margin-bottom:18px">
      <div style="font-size:28px;margin-bottom:8px">✅</div>
      <div style="font-weight:600">No tasks claimed yet</div>
      <div style="font-size:12px;margin-top:4px">Claim an order below to get started</div>
    </div>`;
  }

  // ── AVAILABLE TO CLAIM ──
  if(unassigned.length){
    html+=`<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-top:20px;margin-bottom:10px">Available to Claim (${unassigned.length})</div>`;
    unassigned.forEach(o=>{
      const cust  = CUSTOMERS.find(c=>c.id===o.cust_id);
      const items = Array.isArray(o.items)?o.items:(typeof o.items==='string'?JSON.parse(o.items||'[]'):[]);
      const isOpen = _expandedOrder===('u_'+o.id);
      html+=`
      <div class="card" style="margin-bottom:8px;border-left:4px solid var(--orange);overflow:hidden">
        <!-- Tap to preview -->
        <div onclick="toggleUnassignedExpand('${o.id}')"
          style="padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px;background:${isOpen?'var(--orange-bg)':'var(--surface)'}">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
              <span style="font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800">${typeIcons[o.type]||'📦'} ${o.id}</span>
              <span class="tag to" style="font-size:11px">${(o.status||'').replace('_',' ')}</span>
            </div>
            <div style="font-size:12px;font-weight:600;color:var(--ink2)">${cust?.name||o.cust_id} · ${typeLabels[o.type]||o.type}</div>
            <div style="font-size:11px;color:var(--ink3)">${o.date||'—'} ${o.time?'· '+o.time+' slot':''} ${o.channel?'· '+o.channel:''}</div>
          </div>
          <span style="font-size:18px;color:var(--ink3);flex-shrink:0;${isOpen?'transform:rotate(180deg)':''}">⌄</span>
        </div>
        <!-- Expanded preview -->
        ${isOpen?`
        <div style="border-top:1px solid var(--border);padding:14px 18px;background:var(--bg)">

          <!-- Meta row -->
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px">
            <div><span style="color:var(--ink3)">Type</span> &nbsp;<strong>${typeLabels[o.type]||o.type}</strong></div>
            ${o.channel?`<div><span style="color:var(--ink3)">Channel</span> &nbsp;<strong>${o.channel}</strong></div>`:''}
            ${o.date?`<div><span style="color:var(--ink3)">Date</span> &nbsp;<strong>${o.date}</strong></div>`:''}
            ${o.time?`<div><span style="color:var(--ink3)">Slot</span> &nbsp;<strong>${o.time}</strong></div>`:''}
            ${o.pallets?`<div><span style="color:var(--ink3)">Pallets</span> &nbsp;<strong>${o.pallets}</strong></div>`:''}
          </div>

          <!-- Items -->
          ${items.length?`
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-bottom:8px">What's in this order</div>
          ${items.map(i=>{
            const inv = SKU_CATALOG.find(s=>s.sku===i.sku||s.id===i.sku);
            return `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:700;color:var(--ink)">${i.desc||inv?.name||i.sku||'Unknown item'}</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:3px;font-size:11px;color:var(--ink3)">
                  ${i.sku?`<span>SKU: ${i.sku}</span>`:''}
                  ${inv?.brand?`<span>Brand: ${inv.brand}</span>`:''}
                  ${inv?.category?`<span>${inv.category}</span>`:''}
                  ${i.color||inv?.color?`<span>🎨 ${i.color||inv?.color}</span>`:''}
                  ${i.size||inv?.size?`<span>📐 ${i.size||inv?.size}</span>`:''}
                  ${inv?.condition?`<span>Cond: ${inv.condition}</span>`:''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:18px;font-weight:800;color:var(--ink)">${i.qty}</div>
                <div style="font-size:10px;color:var(--ink3)">units</div>
              </div>
            </div>`;
          }).join('')}`:''}

          <!-- Pallets with location if pallet order -->
          ${o.type==='pallet_out'&&o.pallets?`
          <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink3);margin-bottom:8px;margin-top:${items.length?'12px':'0'}">Pallets to Pull</div>

function toggleUnassignedExpand(orderId){

async function claimAndExpand(orderId){

function markStepDone(e, orderId, stepIndex, totalSteps){
